{% extends "tienda/base.html" %}
{% load static %}

{% block title %}Error - MediStock{% endblock %}

{% block content %}
<section style="min-height: 70vh; padding: 80px 0; background: #f8f9fa;">
    <div class="container">
        <div style="max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; padding: 50px 40px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.1);">
            <div style="width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%); color: white; font-size: 50px; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px;">
                <i class="fa fa-exclamation-triangle"></i>
            </div>

            <h1 style="color: #e67e22; margin-bottom: 15px;">Ha ocurrido un error</h1>
            <p style="color: #555; font-size: 16px;">{{ mensaje|default:"Ocurrió un problema procesando tu solicitud." }}</p>

            <div style="margin-top: 30px;">
                <a href="{% url 'home' %}" class="btn btn-primary">
                    <i class="fa fa-home"></i> Volver al inicio
                </a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
